#
# Lease-UNAWARE Samba config (4.20, no "smb3 directory leases" option) for the
# benchmark "old server" arm. Isolated container on .12:1446, same testshare bind mount.
#
[global]
   workgroup = WORKGROUP
   netbios name = SMBJOLD
   server string = smbj OLD (lease-unaware) Samba %v
   security = user
   map to guest = never

   server min protocol = SMB2_10
   server max protocol = SMB3_11

   # No directory leases here (option does not exist before 4.22). Plain oplocks only.
   oplocks = yes
   level2 oplocks = yes
   kernel oplocks = no

   logging = file
   log file = /var/log/samba/log.%m
   max log size = 5000
   log level = 1

   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   dns proxy = no

[testshare]
   comment = smbj old-server benchmark share
   path = /share
   read only = no
   browseable = yes
   valid users = smbj
   create mask = 0644
   directory mask = 0755
