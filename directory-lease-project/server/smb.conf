#
# Samba config for the smbj directory-lease test harness.
# Runs INSIDE the container only (mapped to host :1445), fully isolated
# from the system smbd (4.19.5) on .12 which keeps 139/445.
#
[global]
   workgroup = WORKGROUP
   netbios name = SMBJDIRLEASE
   server string = smbj dirlease test (Samba %v)
   security = user
   map to guest = never

   # Dir leases need SMB3; allow 2.1+ so we can also exercise file leases.
   server min protocol = SMB2_10
   server max protocol = SMB3_11

   # ---- leases / oplocks ----
   # SMB3 Directory Leases (Samba 4.22+). This is the feature under test.
   smb3 directory leases = yes
   oplocks = yes
   level2 oplocks = yes
   kernel oplocks = no

   # ---- verbose lease logging so we can observe grants + breaks ----
   logging = file
   log file = /var/log/samba/log.%m
   max log size = 10000
   log level = 1 smb2:3 leases:10 locking:5 oplock:5

   # keep the daemon lean (no printing/spoolss)
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   dns proxy = no

[testshare]
   comment = smbj directory lease test share
   path = /share
   read only = no
   browseable = yes
   valid users = smbj
   create mask = 0644
   directory mask = 0755
